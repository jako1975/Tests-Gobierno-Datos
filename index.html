,"Implantación de opciones, identificación del problema, desarrollo de opciones y evaluación de la decisión.","Datos, identificación de criterios, identificación de problemas y análisis de alternativas.","A y C son correctas."]],[157,"Estrategia","Plataforma","¿Qué elementos intervienen en la decisión?",["Decisión, información y acción.","Realimentación, resultado e información.","Acción, datos y decisión.","B y C son correctas."]],[158,"DatosBI","Plataforma","Elige la respuesta correcta.",["Los datos no tienen relevancia, pues no tienen ningún significado si no se contextualizan.","Si el dato está bien contextualizado, obtenemos información veraz y confiable.","El dato es una pieza fundamental en las empresas hoy en día, si los datos cumplen un ciclo de vida y se tienen maestros de datos, se garantiza el éxito en los procesos BI y BA.","La información sin ser procesada genera conocimiento."]],[159,"GobernanzaDato","Plataforma","El ciclo de vida del dato en el gobierno de datos incluye:",["Creación, uso y destrucción.","Almacenaje, distribución y archivo.","Creación, distribución y destrucción.","A y B son correctas."]],[160,"DatosBI","Plataforma","No forma parte de los pasos importantes para construir un ecosistema BI.",["Entender y tener en cuenta los objetivos estratégicos es fundamental para poder dar respuesta a lo que la organización se traza como meta.","Evaluar el estado actual y el estado deseado en cuanto a madurez de la organización.","Definir una estrategia BI, definir una ruta y diseñar y construir las aplicaciones.","Crear modelos de predicción."]],[161,"DatosBI","Plataforma","Menciona dos pasos del proceso de business analytics:",["Predictivo, analítico.","Descriptivo, transformador.","Descriptivo, predictivo.","Ninguna es correcta."]],[162,"DatosBI","Plataforma","¿Por qué es importante crear datos maestros?",["Evita duplicidad de datos.","Aumenta la confiabilidad de los datos.","A y B son correctas.","A y B son incorrectas."]],[163,"DatosBI","Plataforma","Menciona una diferencia del business analytics frente al business intelligence.",["En el BA se realiza análisis predictivo y prescriptivo, en el BI se analizan datos pasados.","Uso de bases de datos NoSQL.","Uso de administración de bases de datos.","Integración y divulgación."]],[164,"DatosBI","Plataforma","Identifica la afirmación falsa con respecto a los beneficios del business analytics:",["Las organizaciones obtienen ventaja competitiva.","Se puede realizar minería de datos para detectar patrones entre datos.","Se pueden simular diferentes escenarios y crear estrategias para mitigar riesgos.","Se puede realizar un análisis descriptivo y diagnóstico de los datos."]],[165,"DatosBI","Plataforma","El análisis que da respuesta a la pregunta de cómo se manejarán futuros escenarios es:",["Análisis descriptivo.","Análisis predictivo.","Análisis prescriptivo.","Ninguna es correcta."]],[166,"DatosBI","Plataforma","El business intelligence es:",["Reactivo.","Proactivo.","Predictivo.","Ninguno de los anteriores."]],[167,"DatosBI","Plataforma","¿Cuáles son etapas del proceso ETL?",["Extracción.","Transformación.","Subida de datos brutos.","A y B son correctas."]],[168,"DatosBI","Plataforma","Son arquitecturas para implementar un data warehouse:",["Arquitectura mecánica.","Arquitectura de una sola capa.","Arquitectura de dos capas.","B y C son correctas."]],[169,"DatosBI","Plataforma","¿Cuáles pueden ser dos posibles fuentes de datos para un data warehouse?",["Bases de datos relacionales y archivos de texto plano.","Archivos XML y codificación de archivos HTML.","Archivos PDF y documentos en papel.","Ninguna de las anteriores."]],[170,"DatosBI","Plataforma","¿Cuáles pueden ser posibles fuentes de datos para un data lake?",["Bases de datos relacionales y archivos de texto plano.","Archivos XML y codificación de archivos HTML.","Archivos PDF y fotos.","Todos las anteriores."]],[171,"DatosBI","Plataforma","El autor Bill Inmon definió las características que debe cumplir un data warehouse. ¿Cuáles son?",["Orientado a un área e integrado.","Portátil y fácil de manejar.","Indexado en el tiempo y no volátil.","A y C son correctas."]],[172,"DatosBI","Plataforma","¿Cuál es la función del data warehouse y del data lake?",["Aumentar el trabajo de los usuarios.","Ayudar en la toma de decisiones.","Centralizar los datos para facilitar el manejo.","Ninguna de las anteriores."]],[173,"DatosBI","Plataforma","Es falso si hablamos de ETL:",["Los datos se transforman en un servidor intermedio antes de subir al DW.","El tiempo de carga, sobre todo la primera vez, es muy rápido.","Altos niveles de mantenimiento.","Las estructuras pueden llegar a ser complejas."]],[174,"DatosBI","Plataforma","Es falso si hablamos de ELT:",["Los datos se cargan y se transforman en un servidor intermedio antes de subir al DW.","El tiempo de carga es muy rápido.","Bajo nivel de mantenimiento.","Es nuevo y complejo de implementar."]],[175,"DatosBI","Plataforma","Es cierto si hablamos de metadatos:",["Son un repositorio central de información.","Da significado a cada componente, variable y atributo que reside en el DW.","Contiene información sobre la estructura del data lake.","A y B son verdaderos"]],[176,"DatosBI","Plataforma","No es una tarea dentro de la metodología Kimball:",["Crear el maestro de datos.","Diseño e implementación de ETL.","Diseño de arquitectura técnica.","Selección de herramientas de implementación."]],[177,"DatosBI","Plataforma","Son áreas de conocimiento dentro de la metodología PMI:",["DevOps.","CRISP-DM.","Costes.","Costes y alcance."]],[178,"DatosBI","Plataforma","¿Cuáles son las rutas para el desarrollo del data warehouse según la metodología Kimball?",["Tecnologías.","Procesos.","Datos.","A y C son correctas."]],[179,"DatosBI","Plataforma","¿Cuántas características define Inmon para el DW?",["1.","8.","4.","6."]],[180,"DatosBI","Plataforma","Son nuevos roles incorporados en los últimos años:",["Ingeniero de datos y analista de datos.","Consumidor de datos.","Usuarios finales.","Consumidores de información."]],[181,"DatosBI","Plataforma","Según el estudio publicado por el BI & Analytics Trend Monitor de BARC, son tendencias del business intelligence:",["Creación de grandes empresas.","Almacenamiento de gran cantidad de datos.","Desarrollo ágil de BI.","Desarrollo ágil de BI y generación de alertas."]],[182,"DatosBI","Plataforma","Menciona dos etapas de la metodología PMI:",["Pretratamiento de los datos brutos.","Inicialización y cierre de los datos maestros.","Control y ejecución del proceso.","Control y supervisión."]],[183,"DatosBI","Plataforma","La metodología DevOps permite:",["Aplicar velocidad a los proyectos subidos a AWS.","Aplicar velocidad a los proyectos subidos a Azure.","Entrega rápida, confiabilidad y escalado de proyectos.","Actuar lento pero seguro en proyectos BI."]],[184,"Marketing","Plataforma","La venta es un proceso:",["En sentido único.","En doble sentido"]],[185,"Marketing","Plataforma","La satisfacción de necesidades es:",["El elemento motivador que anula el proceso de intercambio.","El elemento motivador que facilita el proceso de intercambio"]],[186,"Marketing","Plataforma","Los bienes son:",["Objetos físicos y, como tales, tangibles.","Objetos materiales e inmateriales"]],[187,"Marketing","Plataforma","El sistema de inteligencia de marketing aporta información:",["Sobre aspectos relacionados con la situación y los resultados conseguidos por la empresa.","Sobre los aspectos que tienen lugar en el entorno y que son más significativos para la empresa"]],[188,"AnalíticaWeb","Plataforma","¿Qué métrica no es básica para el análisis web?",["Visitas.","Porcentaje de rebote.","Tiempo real.","Todas son correctas."]],[189,"AnalíticaWeb","Plataforma","¿En un test A/B hay que insertar alguna etiqueta de Google Analytics en nuestra web?",["Nunca.","Solo si no funciona.","Un código que se inserta en la página original y en la de objetivo.","Todas son correctas."]],[190,"AnalíticaWeb","Plataforma","¿Qué herramientas sirven para analizar la velocidad del sitio web?",["Google Webmaster Tools.","Photoshop.","Yslow.","A y C son correctas"]],[191,"AnalíticaWeb","Plataforma",`Relaciona el indicador con lo que mide:
Transacciones -> Número de ventas
Visitas totales -> Visitas a la web
Porcentaje de rebote -> Visitas muy cortas
Webs de referencia -> Páginas de procedencia`,["Todas las relaciones indicadas son correctas.","Solo la relación entre transacciones y número de ventas es correcta.","Solo la relación entre visitas totales y visitas a la web es correcta.","Ninguna de las relaciones indicadas es correcta."]],[192,"AnalíticaWeb","Plataforma","Las herramientas web: ¿en qué indicador basan sus datos?",["Cookies.","Código de Java.","A y B son correctas.","Ninguna es correcta."]],[193,"CRM","Plataforma","Según el profesor Peppers, el beneficio global obtenido a través de la gestión del conocimiento, basada en una estrategia de marketing relacional es del:",["42 %.","24 %.","30 %.","60 %."]],[194,"CRM","Plataforma","La capacidad de suministrar atención y cuidado como a uno mismo es reconocida en el modelo RATER como:",["Reliabilty.","Empathy.","Assurance.","Tangibles."]],[195,"RGPD","Plataforma","De entre los siguientes, ¿cuáles tienen la consideración de datos de carácter personal por parte del RGPD?",["Un nombre.","Un número de identificación.","Información genética.","Todos los anteriores."]],[196,"RGPD","Plataforma","Cuando nuestros datos de carácter personal se quieren incorporar a un tratamiento por una organización, está obligada a:",["Informar sobre quién o quiénes son los responsables del tratamiento.","Informar sobre la finalidad por la que recaban los datos y se van a realizar los tratamientos.","Informar si procede de los destinatarios o grupos de destinatarios de las comunicaciones de datos que se vayan a efectuar.","Todas las respuestas anteriores son ciertas."]],[197,"RGPD","Plataforma","De las operaciones siguientes, indica cuáles se consideran tratamiento de datos:",["Recogida de datos de clientes en un formulario online.","Conservación de datos en copias de seguridad.","Consulta de datos de forma telemática.","Todas las respuestas anteriores son ciertas."]],[198,"RGPD","Plataforma","De entre los siguientes, indica cuáles son obligaciones del responsable de tratamiento conforme al RGPD.",["Atender a las autoridades de control.","Notificar las fallas de seguridad a las autoridades de control y afectados, cuando sea preciso.","Seleccionar diligentemente y formalizar la relación con los encargados de tratamiento.","Todas las anteriores."]],[199,"RGPD","Plataforma","Respecto a las transferencias internacionales a EE. UU., indica qué afirmación es cierta:",["Si existe el consentimiento del afectado, se puede realizar dicha transferencia.","Si EE. UU. dispone de una decisión de adecuación de la Comisión que reconoce un nivel de protección en materia de protección de datos equivalente al de la UE.","Las organizaciones de EE. UU. certificadas de acuerdo con el Escudo de Privacidad (Privacy Shield) tienen reconocido un nivel de protección equivalente al de la UE.","En ningún caso se pueden transferir datos a organizaciones residentes en EE. UU."]],[200,"RGPD","Plataforma","Indica qué afirmación es verdadera:",["Las legislaciones en protección de datos de EE. UU. y la UE son legislaciones tipo ómnibus y equivalentes.","La exportación de datos desde la UE a EE. UU. es libre.","A nivel internacional, la mayoría de los países ofrecen un nivel fuerte de protección en materia de protección de datos equivalente al de la UE.","Existe disparidad entre los marcos legales de la UE y de EE. UU."]],[201,"RGPD","Plataforma","Las trasferencias internacionales de datos son una práctica habitual, pero ¿son legales?",["Sí, siempre que el usuario adecuadamente informado consienta a la transferencia.","Sí, cuando es necesaria para ejecutar un contrato entre el afectado y el responsable del tratamiento.","Sí, si existe una decisión de la Comisión que reconoce, sobre el país destinatario, un nivel de protección equivalente al de la UE.","En todos los casos anteriores son legales."]],[202,"RGPD","Plataforma","¿Qué países forman el Comité de Protección de Datos RGPD, antiguo Grupo de trabajo del artículo 29 (WP29)?",["Los miembros de la UE.","Los miembros de la OCDE.","Los países miembros del G8.","Alemania, Francia, Italia, España y Reino Unido."]],[203,"RGPD","Plataforma","¿Cuáles de los siguientes tratamientos no requieren la realización de una evaluación de impacto?",["Los realizados bajo las directrices de las autoridades de control.","Los necesarios para el cumplimiento de una obligación legal.","Los realizados por autónomos que ejerzan de forma individual.","Ninguno de los anteriores requiere la realización de una evaluación de impacto."]],[204,"RGPD","Plataforma","En big data, ¿qué principio de entre los siguientes se ve principalmente afectado por el overcollecting?",["Principio de minimización de datos.","Principio de limitación de la finalidad.","Exactitud de los datos.","Confidencialidad e integridad."]],[205,"RGPD","Plataforma","El interés legítimo puede dar base legal al tratamiento de datos personales. De entre las siguientes, indica qué afirmación al respecto es incorrecta:",["Si un tratamiento se basa en el interés legítimo, no requiere el consentimiento del afectado.","El interés legítimo se aplica bajo la responsabilidad del responsable de tratamiento, que en su caso deberá demostrar que dicho interés no es anulado por los intereses o derechos y libertades fundamentales del interesado.","El interés legítimo permite justificar cualquier tratamiento de datos de carácter personal.","El derecho de información se debe garantizar, aunque la base legal del tratamiento sea el interés legítimo."]],[206,"RGPD","Plataforma","Una universidad va a realizar un tratamiento de datos biométricos a gran escala que afectará a todos los miembros de la comunidad educativa. Es este contexto, ¿cuál de las siguientes afirmaciones no es correcta?",["Es necesario realizar una EIPD, al ser datos biométricos destinados a la identificación unívoca de las personas a gran escala.","Los datos biométricos no son datos de carácter personal.","Los datos biométricos pertenecen a categorías especiales de datos.","No es necesario realizar una EIPD porque es una pyme."]],[207,"Anonimización","Plataforma","La ley de protección de datos no se aplica sobre los datos disociados obtenidos tras un proceso de disociación.",["Verdadero.","Falso"]],[208,"Anonimización","Plataforma","¿Cuáles de las siguientes técnicas no es de disociación-anonimización?",["Asignación al azar.","Generalización.","Adición de ruido.","T-Combinación."]],[209,"Anonimización","Plataforma","¿Cuáles de los siguientes son riesgos asociados a las técnicas de anonimización?",["Singularización.","Vinculabilidad.","Inferencia.","Todos los anteriores son correctos."]],[210,"Anonimización","Plataforma","La generalización es una técnica del tipo:",["Técnicas que implican la modificación de datos.","Técnicas que implican la reducción de atributos.","Técnicas que implican la supresión de datos.","Técnica de pseudoanonimización."]],[211,"Anonimización","Plataforma","La Dra. Sweeney concluyó que en EE. UU. es posible identificar al 87 % de los ciudadanos unívocamente, a partir de los datos de:",["El número de la seguridad social.","El número de licencia de conducir y el estado emisor.","El código postal completo, sexo y fecha de nacimiento con el año incluido.","El código postal completo, sexo, fecha de nacimiento con el año incluido y raza."]],[212,"Anonimización","Plataforma","¿Cuál de los siguientes riesgos no es de reidentificación?",["Riesgo de singularización.","Riesgo de vinculabilidad.","Riesgo de inferencia.","Riesgo de polarización."]],[213,"Anonimización","Plataforma","De entre las siguientes técnicas, ¿cuál ofrece mejores resultados en términos de menores riesgos de reidentificación?",["Seudonimización.","Adición de ruido.","K-anonimato.","l-Diversity/t-Closeness."]],[214,"Anonimización","Plataforma","De entre las siguientes técnicas, ¿cuál ofrece los peores resultados en términos de menores riesgos de reidentificación?",["Seudonimización.","Adición de ruido.","K-anonimato.","l-Diversity/t-Closeness."]],[215,"Anonimización","Plataforma",`Ten a empresa a largo plazo?"]],[6,"Estrategia","2025","¿Cuál es uno de los principales objetivos de la dirección estratégica?",["Maximizar las ventas a corto plazo.","Aumentar la rotación del personal.","Alcanzar objetivos empresariales a largo plazo.","Reducir el número de departamentos."]],[7,"Estrategia","2025","¿Qué autor define la planificación estratégica como una toma sistemática de decisiones en el presente con conocimiento del futuro?",["Chandler.","Kaplan.","Drucker.","Fleitman."]],[8,"Estrategia","2025","¿Qué elemento NO forma parte del proceso de planificación estratégica según el temario?",["Información.","Metodología.","Pensamiento estratégico.","Automatización."]],[9,"Estrategia","2025","¿Cuál de estas preguntas ayuda a definir la misión de una empresa?",["¿Qué software usamos?","¿Quiénes somos?","¿Cuál es nuestro ROI?","¿Qué alianzas estratégicas tenemos?"]],[10,"Estrategia","2025","¿Cuál de los siguientes NO es un componente típico de la visión empresarial?",["Horizonte temporal.","Valores.","Producto estrella.","Posicionamiento."]],[11,"Estrategia","2025","El análisis PEST incluye los factores:",["Políticos, económicos, sociales y tecnológicos.","Personas, entorno, servicios y tecnología.","Procesos, eficiencia, seguridad y tiempo.","Productividad, estándares, entorno y tendencias."]],[12,"Estrategia","2025","¿Cuál es la diferencia entre análisis PEST y DAFO?",["El PEST se centra en factores internos y el DAFO en externos.","El PEST analiza el sector; el DAFO, la unidad de negocio.","Ambos se centran exclusivamente en los datos económicos.","No hay diferencia, son herramientas equivalentes."]],[13,"Estrategia","2025","¿Qué perspectiva del Cuadro de Mando Integral mide la eficiencia de los procesos internos?",["Perspectiva financiera.","Perspectiva del cliente.","Perspectiva interna.","Perspectiva de valores."]],[14,"DatosBI","pre-2025","¿Existen diferencias entre datos, información y conocimiento?",["No, son exactamente lo mismo.","Sí: datos procesados, información sin significado.","Sí: datos sin procesar; información con significado; conocimiento analítico que genera nuevos aportes.","Datos e información son lo mismo: elementos procesados y con un significado específico."]],[15,"DatosBI","pre-2025","Se consideran datos estructurados:",["Bases de datos.","Datos de sensores.","Precios de acciones.","Todos los anteriores."]],[16,"DatosBI","pre-2025","La principal diferencia entre un data warehouse y un data lake es:",["La cantidad de datos que pueden almacenar.","La tecnología que se utiliza.","En un DW los datos son estructurados; en el data lake pueden ser estructurados y no estructurados.","El DW lo usan las personas del negocio; el data lake, los científicos de datos."]],[17,"DatosBI","pre-2025","Son beneficios de implementar una estrategia de Business Intelligence:",["Reducción de costes, control horario, generación de ingresos y mejora de la atención al cliente.","Reducción de costes, generación de nuevos ingresos, mejora de la atención al cliente y creación de nuevas estrategias.","Reducción de salarios, generación de ingresos, mejora de la atención al cliente y creación de estrategias.","Reducción de costes, generación de nuevos puestos de trabajo, mejora de la atención al cliente y creación de estrategias."]],[18,"DatosBI","pre-2025","¿Cuál es la diferencia entre el proceso ETL y un proceso ELT?",["En ETL los datos se transforman en un servidor intermedio antes de subir al DW; en ELT se suben directamente al data lake.","En ELT los datos se transforman en un servidor intermedio antes de subir al DW; en ETL se suben directamente al data lake.","No existe diferencia: en ambos los datos se suben directamente al servidor.","La diferencia no está en el proceso, sino en los usuarios que lo utilizan."]],[19,"DatosBI","pre-2025","Un data warehouse maximiza:",["La utilización de datos estructurados y no estructurados.","Flexibilidad, facilidad de acceso y administración de los datos.","El análisis y la generación de conocimiento.","La integración de datos históricos con datos de redes sociales."]],[20,"DatosBI","pre-2025","Un data lake maximiza:",["La utilización de datos estructurados y no estructurados.","El análisis y la generación de conocimiento.","Flexibilidad, facilidad de acceso y administración de los datos.","Todas las anteriores."]],[21,"DatosBI","pre-2025","Los principios básicos según la metodología Kimball son:",["Centrarse en el negocio.","Solución completa.","Incrementos significativos.","Todos los anteriores."]],[22,"DatosBI","pre-2025","Dentro de las tendencias del BI, el self service significa que:",["El área de TI debe estar disponible para cualquier requerimiento de un usuario del negocio.","La alta gerencia debería aceptar cualquier requerimiento y ordenar su ejecución inmediata.","Cualquier usuario del negocio tenga las herramientas necesarias para crear reportes y responder preguntas con base en datos.","Ninguna de las anteriores define el self service."]],[23,"DatosBI","pre-2025","Según Inmon, los pasos para construir un data warehouse serían:",["Reconocer los sistemas transaccionales, construir data marts por unidad de negocio y al unirse forman el DW.","Reconocer los sistemas transaccionales, llenar las primeras tablas, los usuarios validan, se completan las tablas y se crean los data marts.","Llenar las tablas de todo el DW y la estructura queda lista para utilizarse.","Reconocer los sistemas transaccionales, construir data marts y el DW en paralelo hasta que ambas estructuras estén creadas."]],[24,"DatosBI","pre-2025","Los data mart son:",["Estructuras muy grandes que después se convierten en data warehouse.","Estructuras que pueden reemplazar un data warehouse.","Estructuras pequeñas que permiten implementar incrementalmente un DW y se asocian a un área específica de la empresa.","Todas las anteriores afirmaciones son verdaderas."]],[25,"DatosBI","2025","¿Qué tipo de datos no tienen una estructura definida?",["Estructurados.","No estructurados.","Semiestructurados.","Relacionales."]],[26,"DatosBI","2025","¿Qué porcentaje del tiempo de un proyecto de BI puede consumir el proceso ETL?",["Entre el 10% y 20%.","Entre el 20% y 40%.","Entre el 60% y 80%.","Más del 90%."]],[27,"DatosBI","2025","¿Cuál es la diferencia entre la carga y la actualización en un proceso ETL?",["La carga solo ocurre en data lakes.","La carga se realiza en un DW vacío; la actualización, en uno con datos existentes.","La actualización es más lenta que la carga.","No existe diferencia, son sinónimos."]],[28,"DatosBI","2025","¿Cuál de los siguientes es un principio básico según la metodología de Kimball?",["Cumplir entregas en incrementos significativos.","Crear un modelo jerárquico.","Aplicar minería de procesos.","Trabajar con datos no estructurados."]],[29,"DatosBI","2025","¿Qué tarea NO forma parte del ciclo de vida de Kimball?",["Diseño de arquitectura técnica.","Análisis de requerimientos.","Diseño e implementación del sistema ETL.","Crear el maestro de datos."]],[30,"DatosBI","2025","¿Qué componente del proceso de preparación de datos busca agrupar información desde diferentes fuentes?",["Limpieza.","Transformación.","Reducción.","Integración."]],[31,"DatosBI","2025","¿Qué tipo de esquema representa un modelo desnormalizado y mejora el rendimiento de las consultas?",["Esquema copo de nieve.","Esquema relacional.","Esquema estrella.","Esquema jerárquico."]],[32,"DatosBI","2025","¿Qué característica NO corresponde al modelo de data warehouse propuesto por Bill Inmon?",["Orientado a un área.","No volátil.","Estructurado en bloques.","Integrado."]],[33,"DatosBI","2025","¿Qué elementos conforman las rutas en el ciclo de vida de Kimball?",["Datos, procesos, personas.","Tecnología, datos, aplicaciones BI.","Infraestructura, talento, redes.","Diseño, codificación, validación."]],[34,"DatosBI","2025","¿Cómo se obtienen los requerimientos del negocio en la metodología Kimball?",["A través de encuestas masivas.","Mediante minería de texto.","A través de entrevistas y sesiones facilitadoras.","Usando métodos automáticos de análisis."]],[35,"DatosBI","2025","¿Cuál es el objetivo principal de los datos maestros (MDM)?",["Generar nuevas fuentes de datos.","Unificar datos críticos en un único repositorio compartido.","Sustituir los sistemas transaccionales.","Crear métricas financieras."]],[36,"DatosBI","2025","¿Qué ventaja NO se asocia directamente a los datos maestros?",["Eliminación de duplicidades.","Actualización automática de informes financieros.","Consistencia de información en toda la organización.","Mayor fiabilidad en la toma de decisiones."]],[37,"DatosBI","2025","¿Cuál de estas afirmaciones es correcta respecto al modelo copo de nieve?",["Tiene menor número de relaciones que el modelo estrella.","Reduce la redundancia de datos.","Tiene mejor rendimiento que el modelo estrella.","No permite relaciones entre dimensiones."]],[38,"DatosBI","2025","¿Qué capa en una arquitectura de DW se encarga del almacenamiento de datos limpios y consolidados?",["Capa de análisis.","Capa de origen.","Capa de almacenamiento.","Capa de usuario."]],[39,"DatosBI","2025","¿Qué herramienta se usa para representar los procesos y dimensiones del negocio según Kimball?",["Matriz DAFO.","Árbol de decisiones.","Matriz hecho/dimensiones (bus matrix).","Modelo PEST."]],[40,"DatosBI","2025","¿Cuántas etapas básicas conforman un proyecto según la metodología PMI?",["Cinco.","Cuatro.","Tres.","Seis."]],[41,"DatosBI","2025","¿Cuál es una diferencia fundamental entre BI y BA?",["BI predice el futuro; BA analiza el pasado.","BI se basa en dashboards; BA, en machine learning.","BA solo trabaja con datos estructurados.","BI usa OLAP; BA, data lakes."]],[42,"DatosBI","2025","¿Qué afirmación es cierta sobre los data lakes?",["Solo almacenan datos estructurados.","Usan un esquema de lectura y el enfoque ELT.","Requieren diseño jerárquico previo.","Son sustitutos de los data warehouses."]],[43,"DatosBI","2025","¿Cuál es una diferencia entre ETL y ELT?",["ELT transforma antes de cargar.","ELT transforma después de cargar los datos.","ETL no permite filtrado de datos.","ETL almacena en formato JSON."]],[44,"DatosBI","2025","¿Qué concepto define la cantidad de detalle de los datos en un data warehouse?",["Amplitud.","Profundidad.","Granularidad.","Resolución."]],[45,"DatosBI","2025","¿Cuál es un beneficio de tener datos granulares según Inmon?",["Evita el uso de metadatos.","Permite la reutilización de los datos.","Reduce el tamaño del data warehouse.","Minimiza la capacidad de consulta."]],[46,"DatosBI","2025","¿Cuál de las siguientes características NO forma parte de la regla SMART para indicadores?",["Simples.","Medibles.","Alcanzables.","Relevantes."]],[47,"DatosBI","2025","¿Qué afirmación es verdadera respecto a los indicadores estratégicos?",["Solo se aplican al área de finanzas.","No requieren estar ligados a la estrategia.","Deben tener una fórmula y fuente de datos definidas.","No deben tener un rango de medición."]],[48,"DatosBI","2025","¿Qué proceso del Business Intelligence se encarga de transformar y cargar datos en un data warehouse?",["BI Cycle.","ETL.","OLAP.","SQL."]],[49,"DatosBI","2025","¿Qué beneficio aporta el uso de metadatos en un data warehouse?",["Guardar copias de seguridad.","Mejorar la seguridad en la red.","Dar significado y contexto a los datos.","Evitar la creación de data marts."]],[50,"DatosBI","2025","¿Qué tipo de estructura es un data mart?",["Un servidor de respaldo.","Un componente de red.","Una estructura departamental del DW.","Un motor de base de datos."]],[51,"DatosBI","2025","¿Cuál NO es un área de conocimiento según el PMI?",["Recursos humanos.","DevOps.","Riesgos.","Calidad."]],[52,"DatosBI","2025","¿Cómo se conoce la metodología de Inmon?",["Metodología lateral.","Bottom-up.","Top-down.","Loop-wise."]],[53,"DatosBI","2025","¿Qué paso del proceso de business analytics responde a la pregunta: qué va a pasar?",["Descriptivo.","Predictivo.","Prescriptivo.","Diagnóstico."]],[148,"DatosBI","2025","¿Cuál es la principal diferencia entre dato, información y conocimiento?",["No existe diferencia, todos significan lo mismo.","El dato tiene contexto; la información no.","El dato es la base, la información le da significado y el conocimiento aporta valor analítico.","La información genera datos y conocimiento a la vez."]],[149,"DatosBI","2025","¿Cuál de estos NO es un tipo de dato según su formato en las empresas?",["Alfanumérico.","Booleano.","Sensorial.","Texto."]],[150,"DatosBI","2025","¿Qué elementos forman los pilares del business analytics según Gartner?",["Procesos, tecnología, ventas y marketing.","Personas, datos, procesos y tecnología.","Equipos, datos, proyectos e informes.","Planificación, infraestructura, dirección y sistemas."]],[54,"GobernanzaDato","pre-2025","El Chief Data Officer es:",["El propietario de los datos.","Identifica a otros Chief Data Officers.","El responsable de la arquitectura e integración de los datos de alto nivel.","El Director de Datos, líder en la estrategia de Gobierno del Dato."]],[55,"GobernanzaDato","pre-2025","¿Por qué es importante implementar el Gobierno del Dato en las empresas?",["Porque ayuda a gestionar los datos maestros.","Porque facilita la disponibilidad, usabilidad, integridad y seguridad de los datos.","Porque administra los datos y hace que las personas que lo gestionan sean más responsables.","Porque administra los datos y asegura que estén bien guardados."]],[56,"GobernanzaDato","pre-2025","El Data Owner es:",["El líder de la empresa en estrategia del gobierno del dato.","El propietario del dato, responsable directo del mismo.","El líder de negocios-experto.","Ninguno de los anteriores define al Data Owner."]],[57,"GobernanzaDato","pre-2025","Son actividades de la oficina de Gobierno de Datos:",["Gestión de metadatos y convencer a la dirección sobre la importancia del proyecto.","Convencer a la dirección de los beneficios de gobernar el dato.","Modelado, gestión, almacenamien
