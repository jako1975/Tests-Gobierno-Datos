ación"}],Va={Estrategia:"Estrategia",DatosBI:"Datos & BI",GobernanzaDato:"Gobierno dato",Marketing:"Marketing",AnalíticaWeb:"Analítica web",CRM:"CRM",RGPD:"RGPD",Anonimización:"Anonimización"},Ga=["A","B","C","D","E"],Of=[[1,"Estrategia","pre-2025","Algunos beneficios de la planificación estratégica son:",["Orientación de la alta gerencia.","Gestión integral.","Aumento de la competitividad.","Todas las anteriores."]],[2,"Estrategia","pre-2025","La planificación estratégica es:",["Una caja de trucos para direccionar la estrategia.","El proceso continuo de tomar sistemáticamente, en el presente, decisiones empresariales con el mayor conocimiento posible de su futuro.","Organizar sistemáticamente los esfuerzos de las áreas más importantes de la empresa.","Determinar metas y objetivos a corto plazo."]],[3,"Estrategia","pre-2025","Para elaborar el plan estratégico es necesario tener en cuenta tres elementos:",["Datos, información y conocimiento.","Datos, conocimiento y pensamiento estratégico.","Información, metodología y pensamiento estratégico.","Ninguna de las anteriores."]],[4,"Estrategia","pre-2025","El análisis PEST/PESTE considera los siguientes aspectos:",["Políticos, económicos, sociales y tecnológicos.","Políticos, económicos, sociales, ambientales y tecnológicos.","Políticos, económicos, sociales, ambientales, tecnológicos y legales.","Todos los anteriores."]],[5,"Estrategia","pre-2025","La misión da respuesta a varios interrogantes, menos a:",["¿Quiénes somos?","¿Qué hacemos?","¿Cómo lo hacemos?","¿Cuál es el camino al cual se dirige la empresa a largo plazo?"]],[6,"Estrategia","2025","¿Cuál es uno de los principales objetivos de la dirección estratégica?",["Maximizar las ventas a corto plazo.","Aumentar la rotación del personal.","Alcanzar objetivos empresariales a largo plazo.","Reducir el número de departamentos."]],[7,"Estrategia","2025","¿Qué autor define la planificación estratégica como una toma sistemática de decisiones en el presente con conocimiento del futuro?",["Chandler.","Kaplan.","Drucker.","Fleitman."]],[8,"Estrategia","2025","¿Qué elemento NO forma parte del proceso de planificación estratégica según el temario?",["Información.","Metodología.","Pensamiento estratégico.","Automatización."]],[9,"Estrategia","2025","¿Cuál de estas preguntas ayuda a definir la misión de una empresa?",["¿Qué software usamos?","¿Quiénes somos?","¿Cuál es nuestro ROI?","¿Qué alianzas estratégicas tenemos?"]],[10,"Estrategia","2025","¿Cuál de los siguientes NO es un componente típico de la visión empresarial?",["Horizonte temporal.","Valores.","Producto estrella.","Posicionamiento."]],[11,"Estrategia","2025","El análisis PEST incluye los factores:",["Políticos, económicos, sociales y tecnológicos.","Personas, entorno, servicios y tecnología.","Procesos, eficiencia, seguridad y tiempo.","Productividad, estándares, entorno y tendencias."]],[12,"Estrategia","2025","¿Cuál es la diferencia entre análisis PEST y DAFO?",["El PEST se centra en factores internos y el DAFO en externos.","El PEST analiza el sector; el DAFO, la unidad de negocio.","Ambos se centran exclusivamente en los datos económicos.","No hay diferencia, son herramientas equivalentes."]],[13,"Estrategia","2025","¿Qué perspectiva del Cuadro de Mando Integral mide la eficiencia de los procesos internos?",["Perspectiva financiera.","Perspectiva del cliente.","Perspectiva interna.","Perspectiva de valores."]],[14,"DatosBI","pre-2025","¿Existen diferencias entre datos, información y conocimiento?",["No, son exactamente lo mismo.","Sí: datos procesados, información sin significado.","Sí: datos sin procesar; información con significado; conocimiento analítico que genera nuevos aportes.","Datos e información son lo mismo: elementos procesados y con un significado específico."]],[15,"DatosBI","pre-2025","Se consideran datos estructurados:",["Bases de datos.","Datos de sensores.","Precios de acciones.","Todos los anteriores."]],[16,"DatosBI","pre-2025","La principal diferencia entre un data warehouse y un data lake es:",["La cantidad de datos que pueden almacenar.","La tecnología que se utiliza.","En un DW los datos son estructurados; en el data lake pueden ser estructurados y no estructurados.","El DW lo usan las personas del negocio; el data lake, los científicos de datos."]],[17,"DatosBI","pre-2025","Son beneficios de implementar una estrategia de Business Intelligence:",["Reducción de costes, control horario, generación de ingresos y mejora de la atención al cliente.","Reducción de costes, generación de nuevos ingresos, mejora de la atención al cliente y creación de nuevas estrategias.","Reducción de salarios, generación de ingresos, mejora de la atención al cliente y creación de estrategias.","Reducción de costes, generación de nuevos puestos de trabajo, mejora de la atención al cliente y creación de estrategias."]],[18,"DatosBI","pre-2025","¿Cuál es la diferencia entre el proceso ETL y un proceso ELT?",["En ETL los datos se transforman en un servidor intermedio antes de subir al DW; en ELT se suben directamente al data lake.","En ELT los datos se transforman en un servidor intermedio antes de subir al DW; en ETL se suben directamente al data lake.","No existe diferencia: en ambos los datos se suben directamente al servidor.","La diferencia no está en el proceso, sino en los usuarios que lo utilizan."]],[19,"DatosBI","pre-2025","Un data warehouse maximiza:",["La utilización de datos estructurados y no estructurados.","Flexibilidad, facilidad de acceso y administración de los datos.","El análisis y la generación de conocimiento.","La integración de datos históricos con datos de redes sociales."]],[20,"DatosBI","pre-2025","Un data lake maximiza:",["La utilización de datos estructurados y no estructurados.","El análisis y la generación de conocimiento.","Flexibilidad, facilidad de acceso y administración de los datos.","Todas las anteriores."]],[21,"DatosBI","pre-2025","Los principios básicos según la metodología Kimball son:",["Centrarse en el negocio.","Solución completa.","Incrementos significativos.","Todos los anteriores."]],[22,"DatosBI","pre-2025","Dentro de las tendencias del BI, el self service significa que:",["El área de TI debe estar disponible para cualquier requerimiento de un usuario del negocio.","La alta gerencia debería aceptar cualquier requerimiento y ordenar su ejecución inmediata.","Cualquier usuario del negocio tenga las herramientas necesarias para crear reportes y responder preguntas con base en datos.","Ninguna de las anteriores define el self service."]],[23,"DatosBI","pre-2025","Según Inmon, los pasos para construir un data warehouse serían:",["Reconocer los sistemas transaccionales, construir data marts por unidad de negocio y al unirse forman el DW.","Reconocer los sistemas transaccionales, llenar las primeras tablas, los usuarios validan, se completan las tablas y se crean los data marts.","Llenar las tablas de todo el DW y la estructura queda lista para utilizarse.","Reconocer los sistemas transaccionales, construir data marts y el DW en paralelo hasta que ambas estructuras estén creadas."]],[24,"DatosBI","pre-2025","Los data mart son:",["Estructuras muy grandes que después se convierten en data warehouse.","Estructuras que pueden reemplazar un data warehouse.","Estructuras pequeñas que permiten implementar incrementalmente un DW y se asocian a un área específica de la empresa.","Todas las anteriores afirmaciones son verdaderas."]],[25,"DatosBI","2025","¿Qué tipo de datos no tienen una estructura definida?",["Estructurados.","No estructurados.","Semiestructurados.","Relacionales."]],[26,"DatosBI","2025","¿Qué porcentaje del tiempo de un proyecto de BI puede consumir el proceso ETL?",["Entre el 10% y 20%.","Entre el 20% y 40%.","Entre el 60% y 80%.","Más del 90%."]],[27,"DatosBI","2025","¿Cuál es la diferencia entre la carga y la actualización en un proceso ETL?",["La carga solo ocurre en data lakes.","La carga se realiza en un DW vacío; la actualización, en uno con datos existentes.","La actualización es más lenta que la carga.","No existe diferencia, son sinónimos."]],[28,"DatosBI","2025","¿Cuál de los siguientes es un principio básico según la metodología de Kimball?",["Cumplir entregas en incrementos significativos.","Crear un modelo jerárquico.","Aplicar minería de procesos.","Trabajar con datos no estructurados."]],[29,"DatosBI","2025","¿Qué tarea NO forma parte del ciclo de vida de Kimball?",["Diseño de arquitectura técnica.","Análisis de requerimientos.","Diseño e implementación del sistema ETL.","Crear el maestro de datos."]],[30,"DatosBI","2025","¿Qué componente del proceso de preparación de datos busca agrupar información desde diferentes fuentes?",["Limpieza.","Transformación.","Reducción.","Integración."]],[31,"DatosBI","2025","¿Qué tipo de esquema representa un modelo desnormalizado y mejora el rendimiento de las consultas?",["Esquema copo de nieve.","Esquema relacional.","Esquema estrella.","Esquema jerárquico."]],[32,"DatosBI","2025","¿Qué característica NO corresponde al modelo de data warehouse propuesto por Bill Inmon?",["Orientado a un área.","No volátil.","Estructurado en bloques.","Integrado."]],[33,"DatosBI","2025","¿Qué elementos conforman las rutas en el ciclo de vida de Kimball?",["Datos, procesos, personas.","Tecnología, datos, aplicaciones BI.","Infraestructura, talento, redes.","Diseño, codificación, validación."]],[34,"DatosBI","2025","¿Cómo se obtienen los requerimientos del negocio en la metodología Kimball?",["A través de encuestas masivas.","Mediante minería de texto.","A través de entrevistas y sesiones facilitadoras.","Usando métodos automáticos de análisis."]],[35,"DatosBI","2025","¿Cuál es el objetivo principal de los datos maestros (MDM)?",["Generar nuevas fuentes de datos.","Unificar datos críticos en un único repositorio compartido.","Sustituir los sistemas transaccionales.","Crear métricas financieras."]],[36,"DatosBI","2025","¿Qué ventaja NO se asocia directamente a los datos maestros?",["Eliminación de duplicidades.","Actualización automática de informes financieros.","Consistencia de información en toda la organización.","Mayor fiabilidad en la toma de decisiones."]],[37,"DatosBI","2025","¿Cuál de estas afirmaciones es correcta respecto al modelo copo de nieve?",["Tiene menor número de relaciones que el modelo estrella.","Reduce la redundancia de datos.","Tiene mejor rendimiento que el modelo estrella.","No permite relaciones entre dimensiones."]],[38,"DatosBI","2025","¿Qué capa en una arquitectura de DW se encarga del almacenamiento de datos limpios y consolidados?",["Capa de análisis.","Capa de origen.","Capa de almacenamiento.","Capa de usuario."]],[39,"DatosBI","2025","¿Qué herramienta se usa para representar los procesos y dimensiones del negocio según Kimball?",["Matriz DAFO.","Árbol de decisiones.","Matriz hecho/dimensiones (bus matrix).","Modelo PEST."]],[40,"DatosBI","2025","¿Cuántas etapas básicas conforman un proyecto según la metodología PMI?",["Cinco.","Cuatro.","Tres.","Seis."]],[41,"DatosBI","2025","¿Cuál es una diferencia fundamental entre BI y BA?",["BI predice el futuro; BA analiza el pasado.","BI se basa en dashboards; BA, en machine learning.","BA solo trabaja con datos estructurados.","BI usa OLAP; BA, data lakes."]],[42,"DatosBI","2025","¿Qué afirmación es cierta sobre los data lakes?",["Solo almacenan datos estructurados.","Usan un esquema de lectura y el enfoque ELT.","Requieren diseño jerárquico previo.","Son sustitutos de los data warehouses."]],[43,"DatosBI","2025","¿Cuál es una diferencia entre ETL y ELT?",["ELT transforma antes de cargar.","ELT transforma después de cargar los datos.","ETL no permite filtrado de datos.","ETL almacena en formato JSON."]],[44,"DatosBI","2025","¿Qué concepto define la cantidad de detalle de los datos en un data warehouse?",["Amplitud.","Profundidad.","Granularidad.","Resolución."]],[45,"DatosBI","2025","¿Cuál es un beneficio de tener datos granulares según Inmon?",["Evita el uso de metadatos.","Permite la reutilización de los datos.","Reduce el tamaño del data warehouse.","Minimiza la capacidad de consulta."]],[46,"DatosBI","2025","¿Cuál de las siguientes características NO forma parte de la regla SMART para indicadores?",["Simples.","Medibles.","Alcanzables.","Relevantes."]],[47,"DatosBI","2025","¿Qué afirmación es verdadera respecto a los indicadores estratégicos?",["Solo se aplican al área de finanzas.","No requieren estar ligados a la estrategia.","Deben tener una fórmula y fuente de datos definidas.","No deben tener un rango de medición."]],[48,"DatosBI","2025","¿Qué proceso del Business Intelligence se encarga de transformar y cargar datos en un data warehouse?",["BI Cycle.","ETL.","OLAP.","SQL."]],[49,"DatosBI","2025","¿Qué beneficio aporta el uso de metadatos en un data warehouse?",["Guardar copias de seguridad.","Mejorar la seguridad en la red.","Dar significado y contexto a los datos.","Evitar la creación de data marts."]],[50,"DatosBI","2025","¿Qué tipo de estructura es un data mart?",["Un servidor de respaldo.","Un componente de red.","Una estructura departamental del DW.","Un motor de base de datos."]],[51,"DatosBI","2025","¿Cuál NO es un área de conocimiento según el PMI?",["Recursos humanos.","DevOps.","Riesgos.","Calidad."]],[52,"DatosBI","2025","¿Cómo se conoce la metodología de Inmon?",["Metodología lateral.","Bottom-up.","Top-down.","Loop-wise."]],[53,"DatosBI","2025","¿Qué paso del proceso de business analytics responde a la pregunta: qué va a pasar?",["Descriptivo.","Predictivo.","Prescriptivo.","Diagnóstico."]],[148,"DatosBI","2025","¿Cuál es la principal diferencia entre dato, información y conocimiento?",["No existe diferencia, todos significan lo mismo.","El dato tiene contexto; la información no.","El dato es la base, la información le da significado y el conocimiento aporta valor analítico.","La información genera datos y conocimiento a la vez."]],[149,"DatosBI","2025","¿Cuál de estos NO es un tipo de dato según su formato en las empresas?",["Alfanumérico.","Booleano.","Sensorial.","Texto."]],[150,"DatosBI","2025","¿Qué elementos forman los pilares del business analytics según Gartner?",["Procesos, tecnología, ventas y marketing.","Personas, datos, procesos y tecnología.","Equipos, datos, proyectos e informes.","Planificación, infraestructura, dirección y sistemas."]],[54,"GobernanzaDato","pre-2025","El Chief Data Officer es:",["El propietario de los datos.","Identifica a otros Chief Data Officers.","El responsable de la arquitectura e integración de los datos de alto nivel.","El Director de Datos, líder en la estrategia de Gobierno del Dato."]],[55,"GobernanzaDato","pre-2025","¿Por qué es importante implementar el Gobierno del Dato en las empresas?",["Porque ayuda a gestionar los datos maestros.","Porque facilita la disponibilidad, usabilidad, integridad y seguridad de los datos.","Porque administra los datos y hace que las personas que lo gestionan sean más responsables.","Porque administra los datos y asegura que estén bien guardados."]],[56,"GobernanzaDato","pre-2025","El Data Owner es:",["El líder de la empresa en estrategia del gobierno del dato.","El propietario del dato, responsable directo del mismo.","El líder de negocios-experto.","Ninguno de los anteriores define al Data Owner."]],[57,"GobernanzaDato","pre-2025","Son actividades de la oficina de Gobierno de Datos:",["Gestión de metadatos y convencer a la dirección sobre la importancia del proyecto.","Convencer a la dirección de los beneficios de gobernar el dato.","Modelado, gestión, almacenamiento e integración de datos y metadatos.","Ninguna de las anteriores."]],[58,"GobernanzaDato","pre-2025","Dentro de los nuevos roles en el gobierno del dato encontramos:",["El director de datos o Chief Data Officer.","Data owners o propietarios de datos.","El científico de datos.","Todas las anteriores son correctas."]],[59,"Marketing","pre-2025","El concepto de marketing está estrechamente vinculado con la relación de intercambio.",["Correcto.","Incorrecto."]],[60,"Marketing","pre-2025","El marketing como filosofía:",["Defiende el establecimiento de unas relaciones permanentes con los clientes.","Defiende el establecimiento de unas relaciones no permanentes con los clientes."]],[61,"Marketing","pre-2025","El marketing como disciplina científica:",["Es reconocido como una rama de la economía que estudia los canales de distribución.","Es reconocido como una ciencia aplicada del comportamiento que trata de comprender las relaciones entre compradores y vendedores."]],[62,"Marketing","pre-2025","La investigación de marketing consiste en:",["El diseño sistemático, análisis de datos y recogida de información para resolver un problema concreto.","El diseño sistemático, análisis de datos y recogida de información para resolver un problema o una oportunidad presente o latente de la empresa."]],[63,"Marketing","pre-2025","Si una empresa descubre que ciertos productos se venden a clientes de un nivel específico de ingresos y con una determinada publicidad, es gracias a:",["El análisis descriptivo.","El análisis predictivo.","El análisis prescriptivo.","Cualquiera de los anteriores."]],[64,"Marketing","2025","¿Cuál es el primer paso del proceso de marketing según Philip Kotler?",["Diseñar un programa de marketing.","Medir la cuota de mercado.","Entender el mercado y las necesidades del cliente.","Analizar la competencia."]],[65,"Marketing","2025","¿Qué orientación empresarial se centra en producir eficientemente sin tener en cuenta al cliente?",["Orientación al marketing.","Orientación a las ventas.","Orientación a la producción.","Orientación al cliente."]],[66,"Marketing","2025","¿Cuál de los siguientes conceptos describe mejor la demanda?",["Deseo sin recursos económicos.","Sensación de carencia.","Compra impulsiva.","Deseo condicionado por los recursos disponibles."]],[67,"Marketing","2025","¿Qué elemento del marketing se refiere a bienes tangibles o intangibles capaces de satisfacer necesidades?",["Servicio.","Producto.","Promoción.","Demanda."]],[68,"Marketing","2025","Según Kotler, ¿cuál es el cuarto paso definitivo del proceso de marketing?",["Diseñar una estrategia enfocada en el cliente.","Analizar el mercado.","Diseñar el programa de marketing.","Conseguir relaciones beneficiosas con los clientes."]],[69,"Marketing","2025","¿Qué función cumple el sistema de información de marketing (SIM)?",["Automatizar la producción de bienes.","Gestionar la publicidad en redes sociales.","Capturar, analizar y distribuir información útil para la toma de decisiones.","Gestionar únicamente la contabilidad interna."]],[70,"Marketing","2025","¿Qué componente NO forma parte de un sistema de información de marketing (SIM)?",["Sistema de inteligencia de marketing.","Base de datos externa.","Sistema de datos internos.","Investigación de mercados."]],[71,"Marketing","2025","¿Qué tipo de datos NO tiene coste adicional para la empresa?",["Datos externos.","Datos del mercado.","Datos internos.","Datos demográficos."]],[72,"Marketing","2025","¿Cuál de estas afirmaciones es VERDADERA sobre el enfoque actual del marketing?",["Se centra solo en el precio del producto.","Implica entender en profundidad las necesidades individuales del cliente.","Se enfoca en vender lo ya producido.","Ignora los datos del consumidor."]],[73,"Marketing","2025","¿Cuál es el objetivo principal de la investigación de marketing?",["Hacer promociones atractivas.","Evaluar únicamente al cliente interno.","Conocer el nivel de satisfacción del cliente y los problemas u oportunidades del mercado.","Crear productos con base en modas."]],[74,"Marketing","2025","¿Qué método de investigación de marketing analiza datos mediante observación directa del comportamiento?",["Encuestas.","Grupos focales.","Observación.","Test de concepto."]],[75,"AnalíticaWeb","pre-2025","Corresponde a esta definición: la medida en que un sitio web puede ser usado por usuarios específicos para conseguir objetivos con efectividad, eficiencia y satisfacción en un contexto de uso concreto.",["Analítica web.","Usabilidad.","Engagement.","Ninguna es correcta."]],[76,"AnalíticaWeb","pre-2025","Elige una métrica de entre las siguientes:",["Visitas.","Usuarios en España.","Provienen de Yahoo.","Todas son correctas."]],[77,"AnalíticaWeb","pre-2025","¿Puede un sitio web tener más Páginas Vistas que Visitas?",["No.","Sí.","Solo a veces.","Todas son correctas."]],[78,"AnalíticaWeb","pre-2025","Cuando finaliza, en general, una sesión en Google Analytics:",["A los 30 minutos de iniciada la sesión.","A los 20 minutos de iniciada la sesión.","A los 15 minutos de iniciada la sesión.","Cuando apagas el ordenador."]],[79,"AnalíticaWeb","pre-2025","Relaciona el indicador % de rebote con lo que mide:",["Visitas muy cortas.","Número de ventas.","Visitas a la web.","Páginas de procedencia."]],[80,"AnalíticaWeb","pre-2025","La velocidad de un sitio es importante para:",["Solo la experiencia de navegación.","La experiencia de usuario.","El posicionamiento en buscadores.","La experiencia de usuario y el posicionamiento en buscadores."]],[81,"AnalíticaWeb","pre-2025","La A de Assurance en el modelo RATER se traduce por:",["Capacidad de los empleados en dar un buen servicio.","La presencia física del personal, material, etc. que proporciona el servicio.","La capacidad de suministrar atención y cuidado como a uno mismo.","Disposición a atender al cliente de forma rápida y amable."]],[82,"AnalíticaWeb","2025","¿Qué función cumple la analítica web?",["Crear contenido visual atractivo.","Medir las ventas en tienda física.","Recoger, analizar y reportar datos de navegación para optimizar el sitio.","Diseñar campañas offline."]],[83,"AnalíticaWeb","2025","¿Cuál de estas es una métrica básica en analítica web?",["Número de seguidores en redes sociales.","Visitantes únicos.","Opiniones en foros.","Tiempo de vida del producto."]],[84,"AnalíticaWeb","2025","¿Qué indica un porcentaje de rebote alto en una web con múltiples páginas?",["Alta roactiva e interactiva:",["Utilización multicanal para estar en contacto útil con los clientes.","Información puntual del estado de los pedidos.","Servicio 24 horas.","Todos son ejemplos válidos."]],[95,"CRM","pre-2025","Entre los factores clave para la implantación de un buen CRM, NO está:",["Todos los de abajo son factores clave; ninguna opción queda fuera.","La tecnología.","Una buena comunicación con el cliente.","Perspectiva a largo plazo."]],[96,"CRM","pre-2025","Según Domínguez (2009), las bases para un buen CRM NO estarían en:",["Identificar las expectativas del cliente.","Comparar las características del servicio prestado con las expectativas del cliente y determinar las áreas de mejora.","Comunicación omnicanal permanente y de valor con el cliente.","Todas deberían estar en un buen CRM."]],[97,"CRM","pre-2025","La razón principal del marketing relacional es:",["Mantener y fidelizar clientes.","Vender más.","Analizar el servicio al cliente.","Realizar promociones."]],[98,"CRM","2025","¿Cuál es el objetivo principal del marketing relacional?",["Aumentar el gasto en campañas publicitarias.","Vender más a corto plazo.","Mantener y fidelizar clientes.","Reducir los canales de comunicación."]],[99,"CRM","2025","¿Qué tipo de marketing relacional se basa en una relación de igual a igual entre cliente y proveedor?",["Marketing relacional básico.","Marketing relacional estadístico.","Marketing relacional de socio.","Marketing relacional reactivo."]],[100,"CRM","2025","¿Qué autor definió el CRM como una estrategia para crear y mantener relaciones a largo plazo con los clientes?",["Peppers.","Kotler.","Thompson.","Vidal."]],[101,"CRM","2025","¿Cuál es la palabra clave que, según el texto, mejor define al CRM?",["Cliente.","Cambio.","Coste.","Comunicación."]],[102,"CRM","2025","¿Cuál de los siguientes NO es un beneficio directo del marketing relacional según Peppers?",["Reducción de costes de adquisición.","Relación promocional temporal.","Fidelización del cliente.","Mejora del coste de servicio."]],[103,"CRM","2025","¿Qué debe hacer una organización para que una estrategia CRM tenga éxito?",["Tener un software de gestión actualizado.","Mantener sus procesos sin cambios.","Estar dispuesta a cambiar sus prácticas de negocio.","Invertir en promociones masivas."]],[104,"CRM","2025","¿Qué característica NO forma parte del marketing relacional?",["Perspectiva a largo plazo.","Soluciones personalizadas.","Foco exclusivo en el producto.","Cooperación con partners y proveedores."]],[105,"CRM","2025","¿Qué factor clave permite identificar, segmentar y seleccionar clientes potenciales en una estrategia CRM?",["Canales de televisión.","Publicidad impresa.","Análisis de datos.","Sorteos y promociones."]],[106,"RGPD","pre-2025","Atendiendo al RGPD, ¿qué debemos entender por dato de carácter personal?",["Toda información sobre una persona física identificada o identificable.","Toda información relativa a la vida privada de las personas.","Los datos de identificación de las personas.","Toda información que concierna a personas, estén fallecidas o no."]],[107,"RGPD","pre-2025","El Convenio 108 del Consejo de la CE fue el primer instrumento que regularía un marco común de protección de datos en la UE. ¿De qué año es?",["1995.","1992.","1999.","1981."]],[108,"RGPD","pre-2025","¿Cuáles de entre los siguientes forman parte de los principios generales de la protección de datos del RGPD?",["Confidencialidad e integridad (seguridad adecuada).","Responsabilidad proactiva.","Transparencia de la información.","Ninguno de los anteriores.","Todos los anteriores."]],[109,"RGPD","pre-2025","¿Para cuáles de los siguientes casos el RGPD reconoce la necesidad de establecer protección específica para el tratamiento de menores?",["Utilización de datos personales de niños con fines de mercadotecnia.","Elaboración de perfiles de personalidad o de usuario.","Obtención de datos personales relativos a niños cuando se utilicen servicios ofrecidos directamente a un niño.","Todos los anteriores.","Ninguno de los anteriores."]],[110,"RGPD","pre-2025","¿Cuáles son afirmaciones correctas sobre seguridad en el RGPD?",["La seguridad absoluta no existe; se abordan los riesgos buscando el equilibrio entre coste y efecto.","La aplicación de los controles de la ISO/IEC 27002 garantiza la seguridad eliminando todos los riesgos.","El RGPD incorpora medidas de seguridad clasificadas en nivel bajo, medio y alto.","Las grandes corporaciones son las únicas que tienen que establecer un marco de seguridad."]],[111,"RGPD","pre-2025","Identifica cuál o cuáles son principios de la Privacidad por Diseño:",["Privacidad como la configuración predeterminada (privacidad por defecto).","Privacidad incrustada en el diseño.","Seguridad extremo a extremo, protección de ciclo de vida completo.","Todos son principios de la privacidad por diseño (a, b y c)."]],[112,"RGPD","pre-2025","Selecciona las categorías que NO tienen la consideración de datos de categorías especiales según el RGPD:",["Los datos que revelen el origen étnico o racial.","Los tratamientos de datos genéticos.","Los datos biométricos dirigidos a identificar unívocamente a una persona.","La hoja de vida profesional o currículum vitae."]],[113,"RGPD","pre-2025","Respecto a los derechos que el RGPD reconoce a los afectados, ¿cuál de entre los siguientes NO es un derecho reconocido?",["Acceso.","Legitimación.","Rectificación.","Oposición."]],[114,"RGPD","pre-2025","¿En qué caso NO se recomienda la realización de una evaluación de impacto?",["Cuando el tratamiento afecta a un número elevado de personas.","Cuando se traten grandes volúmenes de datos personales.","Cuando existan transferencias internacionales.","Cuando el tratamiento es esporádico, limitado y afecte a personas de interés público."]],[115,"RGPD","pre-2025","¿Cuáles de los siguientes aspectos se corresponden con las amenazas del Big Data definidas por el WP29?",["Magnitud de la recopilación.","Seguridad de los datos.","Dramático aumento de las posibilidades de vigilancia del gobierno.","Todas las anteriores."]],[116,"RGPD","pre-2025","¿Qué afirmación es FALSA dentro de las evaluaciones de impacto?",["La Ley vigente obliga a la realización de evaluaciones de impacto cada 6 meses de manera obligatoria.","La evaluación de impacto es un proceso sistemático y reproducible.","El resultado de la evaluación se debe plasmar en un documento.","La evaluación de impacto debe ser un proceso periódico."]],[117,"RGPD","2025","Una red social configura por defecto los perfiles nuevos como públicos. ¿Qué requisito del RGPD debería haber aplicado?",["Protección de datos desde el diseño (privacidad por diseño y por defecto).","Evaluación de impacto.","Legitimación por interés legítimo.","Minimización de datos."]],[118,"RGPD","2025","Una empresa de ecommerce envía newsletters comerciales sin consentimiento previo, alegando interés legítimo. ¿Es lícito este tratamiento?",["Sí, siempre que se haya informado previamente al cliente.","No, porque se requiere consentimiento explícito para comunicaciones comerciales.","Sí, si se ha realizado una evaluación de impacto.","No, salvo que sea cliente habitual."]],[119,"RGPD","2025","Una empresa de retail analiza datos históricos de compras recogidos hace más de 10 años para desarrollar modelos predictivos. ¿Qué principio puede estar en riesgo?",["Confidencialidad.","Limitación de la finalidad.","Seguridad.","Limitación del plazo de conservación."]],[120,"RGPD","2025","Una entidad financiera usa scoring de big data para conceder créditos. Los clientes denegados no saben por qué ni cómo se tomó la decisión. ¿Qué derecho está siendo vulnerado?",["Derecho a la portabilidad de datos.","Derecho de acceso.","Derecho a no ser objeto de decisiones basadas exclusivamente en tratamientos automatizados.","Derecho a la rectificación."]],[121,"RGPD","2025","Una empresa de marketing digital lanza una app que accede a la ubicación GPS sin informar claramente a los usuarios. ¿Qué principio del RGPD está vulnerando?",["Principio de minimización de datos.","Principio de integridad y confidencialidad.","Principio de transparencia.","Principio de limitación de conservación."]],[122,"RGPD","2025","Una clínica veterinaria externaliza su sistema de gestión a una empresa tecnológica sin firmar un contrato formal. ¿Qué obligación principal se está incumpliendo?",["Registro de actividades de tratamiento.","Contrato entre responsable y encargado del tratamiento.","Evaluación de impacto.","Designación de un DPO."]],[123,"RGPD","2025","Una aseguradora usa big data con datos de wearables y redes sociales para crear perfiles de salud. ¿Qué principio fundamental podría estar vulnerando?",["Minimización.","Exactitud.","Transparencia.","Limitación del plazo de conservación."]],[124,"RGPD","2025","Una empresa contrata servicios cloud en EEUU para almacenar datos de salud sin verificar garantías suficientes. ¿Qué está incumpliendo?",["La obligación de anonimización.","El principio de conservación.","Las garantías para transferencias internacionales de datos.","El principio de minimización."]],[125,"RGPD","2025","Una plataforma educativa ofrece acceso gratuito a niños de 12 años recogiendo datos sobre su rendimiento académico sin autorización paterna. ¿Se está cumpliendo el RGPD?",["Sí, porque el menor puede consentir a partir de los 10 años.","No, porque el mínimo de edad para consentir es de 16 años.","Sí, si el tratamiento no incluye perfiles.","No, porque los padres o tutores deberían dar su consentimiento."]],[126,"RGPD","2025","Una empresa española transfiere datos a una filial en EEUU sin cláusulas contractuales ni decisión de adecuación de la Comisión Europea. ¿Qué medida sería adecuada para que la transferencia sea legal?",["Obtener consentimiento explícito del interesado.","Enviar los datos cifrados.","Publicarlo en su página web.","Firmar un contrato con una empresa auditora."]],[127,"RGPD","2025","Una empresa de seguros implementa precios personalizados según perfiles de riesgo extraídos de big data. ¿En qué situación sería obligatoria la EIPD?",["Si se tratan datos de contacto.","Solo si afecta a más de 1.000 personas.","Si hay perfilado automatizado que afecta significativamente a los interesados.","Si los datos están pseudonimizados."]],[128,"RGPD","2025","Una red social analiza masivamente comportamientos políticos de sus usuarios para campañas dirigidas a terceros, sin informarles. ¿Qué principio se vulnera?",["Seguridad.","Limitación de la finalidad.","Portabilidad de los datos.","Minimización de datos."]],[129,"RGPD","2025","Una startup de salud digital trata datos sobre enfermedades sin implementar medidas técnicas de seguridad más allá de un antivirus básico. ¿Qué principio del RGPD se está incumpliendo?",["Exactitud de los datos.","Seguridad del tratamiento.","Minimización.","Portabilidad."]],[130,"RGPD","2025","Una empresa recibe una solicitud de eliminación de datos pero decide mantenerlos 5 años por si fueran útiles. ¿Qué derecho del interesado está vulnerando?",["Derecho de acceso.","Derecho a la portabilidad.","Derecho de supresión.","Derecho a la limitación del tratamiento."]],[131,"RGPD","2025","Una plataforma de IA para selección de personal, entrenada con perfiles masculinos, discrimina sistemáticamente a candidatas. ¿Qué tipo de riesgo del RGPD se ha materializado?",["Riesgo de inexactitud.","Riesgo de discriminación por sesgo.","Riesgo de pérdida de confidencialidad.","Riesgo de transferencias internacionales ilegítimas."]],[132,"RGPD","2025","Una app de salud mental predice episodios depresivos sin explicar el criterio de etiquetado a los afectados. ¿Qué principio del RGPD debería haberse aplicado?",["Minimización de datos.","Privacidad por defecto.","Transparencia en la toma de decisiones automatizadas.","Exactitud de los datos."]],[133,"RGPD","2025","Una empresa combina datos de navegación web con geolocalización de móviles para publicidad sin consentimiento. ¿Qué principio está siendo vulnerado?",["Minimi
